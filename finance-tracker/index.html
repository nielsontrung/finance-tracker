<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" charset="utf-8" />
    <title>Finance Tracker</title>
    <!-- including ECharts file -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.1.0/dist/echarts.min.js"></script>
    <!-- include jquery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6"
      crossorigin="anonymous"
    />
    <!-- bootstrap JavaScript Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
    <!-- data tables library -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.datatables.net/v/bs4/dt-1.10.24/datatables.min.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.datatables.net/v/bs4/dt-1.10.24/datatables.min.js"
    ></script>
    <script src="data.js"></script>
    <script src="stats.js"></script>
    <script src="table-data.js"></script>
    <script src="table.js"></script>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row justify-content-center">
        <div id="chart-div" class="col">
          <p><b>Yearly Expenses per Category</b></p>
          <div id="pie-chart" style="width: 800px; height: 760px"></div>
          <p><b>Yearly Expenses per Category</b></p>
          <div
            id="category-bar-chart"
            style="width: 700px; height: 740px"
          ></div>
          <p><b>Yearly Earnings per Month</b></p>
          <div
            id="monthly-earnings-bar-chart"
            style="width: 700px; height: 600px"
          ></div>
          <p><b>Yearly Expenses per Month</b></p>
          <div
            id="monthly-expenses-bar-chart"
            style="width: 700px; height: 600px"
          ></div>
          <div id="line-race-chart" style="width: 100%; height: 600px"></div>
        </div>
        <div id="table-div" class="nopadding sticky">
          <table id="table" class="display" width="100%" height=""></table>
        </div>
      </div>
    </div>
    <div></div>
    <!-- include custom scripts -->
    <script src="pie-chart.js"></script>
    <script src="monthly-expenses-bar-chart.js"></script>
    <script src="monthly-earnings-bar-chart.js"></script>
    <script src="category-bar-chart.js"></script>
    <script src="line-race-chart.js"></script>
  </body>
</html>
